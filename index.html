<!DOCTYPE html>
<html>
<head>
  <title>ZyloMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* Top bar */
.topbar {
  background: black;
  color: white;
  text-align: center;
  padding: 8px;
  font-size: 12px;
}

/* Header */
header {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #111;
  color: white;
  padding: 10px;
}

header input {
  width: 90%;
  padding: 8px;
  margin-top: 10px;
}

/* Menu */
nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: black;
  padding: 10px;
  flex-wrap: wrap;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* Hero */
.hero {
  background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') no-repeat center;
  background-size: cover;
  height: 250px;
  color: white;
  display: flex;
  align-items: center;
  padding: 20px;
}

.hero h2 {
  font-size: 24px;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

button {
  background: black;
  color: white;
  padding: 8px;
  border: none;
}

  </style>
</head>

<body>

<div class="topbar">
FREE SHIPPING OVER ₹999 | CALL: 8130593238
</div>

<header>
  <h2>ZyloMart</h2>
  <input type="text" placeholder="Search products...">
</header>

<nav>
  <a href="#">MEN</a>
  <a href="#">WOMEN</a>
  <a href="#">TOPS</a>
  <a href="#">SALE</a>
</nav>

<section class="hero">
  <h2>UP TO 70% OFF</h2>
</section>

<section class="products" id="products"></section>

<script>
const products = [
  {
    name: "Black Shirt",
    price: 599,
    image: "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"
  },
  {
    name: "Crop Top",
    price: 399,
    image: "https://images.unsplash.com/photo-1520975922203-bf7f0c36a0b0"
  },
  {
    name: "Jeans",
    price: 799,
    image: "https://images.unsplash.com/photo-1582418702059-97ebafb35d09"
  },
  {
    name: "Dress",
    price: 999,
    image: "https://images.unsplash.com/photo-1521334884684-d80222895322"
  }
];

const container = document.getElementById("products");

products.forEach(p => {
  container.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button>Add to Cart</button>
    </div>
  `;
});
</script>

</body>
</html>
